# =============================================================================
# PREFIX
# =============================================================================
# Remap prefix from Ctrl+b to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


# =============================================================================
# GENERAL
# =============================================================================
# Mouse support
set -g mouse on

# Start windows and panes at 1 (easier to reach than 0)
set -g base-index 1
setw -g pane-base-index 1

# Re-number windows when one is closed
set -g renumber-windows on

# Bigger scrollback history
set -g history-limit 50000

# Reduce escape-time (important for Neovim)
set -sg escape-time 10

# True color support (required for Neovim themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Focus events (required for some Neovim plugins)
set -g focus-events on


# =============================================================================
# KEY BINDINGS
# =============================================================================
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded!"

# More intuitive splits that open in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window opens in current directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with capital HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# =============================================================================
# STATUS BAR
# =============================================================================
set -g status-position bottom
set -g status-style 'bg=colour235 fg=colour255'

# Left: session name
set -g status-left '#[bold][#S] '
set -g status-left-length 20

# Right: date and time
set -g status-right '#[fg=colour255]%Y-%m-%d %H:%M'
set -g status-right-length 30

# Window tab style
setw -g window-status-current-style 'fg=colour0 bg=colour255 bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-format ' #I:#W '

# Maintain 70/30 top-pane split on terminal resize (only for 3-pane layouts)
set-hook -g after-resize-window {
    if -F '#{==:#{window_panes},3}' {
        resize-pane -t :.1 -x '70%'
    }
}

# Bell — visual indicator in status bar (used by notify.sh for Claude attention)
set-option -g visual-bell off
set-window-option -g window-status-bell-style fg=colour196,bold

# Borg: jump to most pressing project (borg next --switch)
bind > run-shell "$HOME/.local/bin/borg next --switch 2>/dev/null || tmux display-message 'All clear — take a break'"
